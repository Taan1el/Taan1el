name: GitHub Profile 3D Contrib

# Generates an isometric 3D contribution calendar into profile-3d-contrib/
# and commits it back to main. The README links to the generated SVG.

on:
  schedule:
    # Rebuild once a day at 18:00 UTC
    - cron: "0 18 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  push:
    branches:
      - main
    # Ignore the bot's own output commit so it can't retrigger itself (no loop)
    paths-ignore:
      - "profile-3d-contrib/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          git commit -m "chore: update 3D contribution calendar" || echo "no changes to commit"
          git push
