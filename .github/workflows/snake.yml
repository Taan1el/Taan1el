name: Generate Contribution Snake

# Generates the animated contribution-grid snake and pushes the
# resulting SVGs to the `output` branch, which the README links to.

on:
  schedule:
    # Rebuild once a day at 00:00 UTC
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Rebuild on every push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#7aa2f7
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#7aa2f7

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
